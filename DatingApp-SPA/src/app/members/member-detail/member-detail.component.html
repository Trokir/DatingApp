<div class="container mt-5">
  <div class="row">
    <h1>{{user.knownAs}}</h1>
  </div>
  <div class="row">
    <div class="col-sm-4">
<div class="card">
  <img class="card-img-top img-thumbnail" src="{{user?.photoUrl}}" alt="{{user?.knownAs}}">
  <div class="card-body">
    <strong>Location:</strong>
    <p>{{user.city}} , {{user?.country}}</p>
  </div>
  <div>
    <strong>Age:</strong>
    <p>{{user.age}}</p>
  </div>
  <div>
    <strong>Last Active:</strong>
    <p>{{user.lastactive}}</p>
  </div>
  <div>
    <strong>Member since:</strong>
    <p>{{user.created}}</p>
  </div>
</div>
<div class="card-footer">
  <div class="btn-group d-flex">
    <button class="ttn btn-primary w-100">Like</button>
    <button class="ttn btn-success w-100">Message</button>
  </div>
</div>
    </div>
    <div class="col-sm-8">
<div class="tab-panel">
  <tabset class="member-tabset">
    <tab heading="About {{user?.knownAs}}">
      <h4>Description</h4>
      <p>{{user.introduction}}</p>
      <h4>Looking For</h4>
      <p>{{user.lookingFor}}</p>
    </tab>
    <tab heading="Interests ">
      <h4>Interests</h4>
      <p>{{user.interests}}</p>
    </tab>
    <tab heading="Photos ">
     <ngx-gallery [options]="galleryOptions" [images]="galleryImages"></ngx-gallery>
    </tab>
    <tab heading="Messages ">
      <h4>Messages will go here</h4>
    </tab>
  </tabset>
</div>
    </div>
  </div>
</div>
